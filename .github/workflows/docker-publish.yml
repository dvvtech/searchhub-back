name: Deploy to VM

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/SearchHub.Api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Copy docker-compose.yml to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "deploy/docker-compose.yml"
          target: "/home/dvvtech/deploy/searchhub/"
          strip_components: 1
      
      - name: Deploy to VM via SSH (Swarm mode)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /home/dvvtech/deploy/searchhub
            
            # Pull the latest images
            docker compose pull

            #docker stack rm searchhub-stack
            #sleep 10

            # Deploy/Update the stack (this creates/updates services)
            docker stack deploy -c docker-compose.yml searchhub-stack
            
            # Wait a few seconds for services to stabilize
            sleep 5
            
            # Clean up unused images
            docker image prune -f
            
            # Show deployed services (for debugging)
            docker service ls
            echo "Deployment completed. Services status:"
            docker service ls --filter name=searchhub-stack
